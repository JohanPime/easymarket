<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>easymarket chat console</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1220;
        --panel: #111a2b;
        --text: #e7edf7;
        --muted: #a7b4c8;
        --error: #ff7a7a;
        --ok: #71d08f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #16243d 0%, var(--bg) 50%);
        color: var(--text);
        min-height: 100dvh;
      }
      .app { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 280px 1fr; min-height: 100dvh; }
      .sidebar { border-right: 1px solid #22314d; padding: 1rem; background: rgba(10, 16, 28, 0.75); }
      .field { margin-top: 1rem; }
      label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.4rem; }
      input, textarea, button { width: 100%; border-radius: 10px; border: 1px solid #2c3d5d; background: #0d1728; color: var(--text); padding: 0.7rem; font: inherit; }
      button { cursor: pointer; background: #2469b8; border: 0; font-weight: 600; }
      button.secondary { margin-top: 0.5rem; background: #22314d; }
      .main { padding: 1rem; display: grid; grid-template-rows: auto 1fr auto; gap: 0.8rem; }
      .top { border: 1px solid #22314d; border-radius: 12px; padding: 0.8rem 1rem; background: rgba(17, 26, 43, 0.8); }
      .status { font-size: 0.9rem; color: var(--muted); }
      .status.error { color: var(--error); }
      .status.ok { color: var(--ok); }
      .messages { border: 1px solid #22314d; border-radius: 12px; background: rgba(17, 26, 43, 0.7); padding: 1rem; overflow: auto; }
      .bubble { max-width: min(85%, 680px); margin-bottom: 0.8rem; padding: 0.75rem 0.9rem; border-radius: 12px; line-height: 1.4; white-space: pre-wrap; }
      .bubble.user { margin-left: auto; background: #24446b; }
      .bubble.assistant { margin-right: auto; background: #1f2d45; }
      .meta { font-size: 0.75rem; margin-bottom: 0.35rem; color: #aac0de; }
      .composer { display: grid; grid-template-columns: 1fr auto; gap: 0.6rem; }
      .composer textarea { min-height: 72px; resize: vertical; }
      .hint { margin-top: 0.5rem; color: var(--muted); font-size: 0.8rem; }
      @media (max-width: 860px) { .app { grid-template-columns: 1fr; } .sidebar { border-right: 0; border-bottom: 1px solid #22314d; } }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>easymarket chat</h1>
        <p class="hint">mvp para web + base meta-ready</p>

        <div class="field">
          <label for="tenant">tenant</label>
          <input id="tenant" value="demo" />
        </div>

        <div class="field">
          <label for="apiKey">x-api-key (opcional)</label>
          <input id="apiKey" placeholder="si el tenant usa auth" />
        </div>

        <div class="field">
          <label for="systemPrompt">system prompt opcional</label>
          <textarea id="systemPrompt" placeholder="si lo dejas vacío usa el prompt interno del worker"></textarea>
        </div>

        <button id="newChat" class="secondary" type="button">nueva conversación</button>
      </aside>

      <main class="main">
        <header class="top">
          <strong>chat de prueba gemini</strong>
          <div class="status" id="status">listo</div>
          <div class="status" id="meta">0 mensajes</div>
        </header>

        <section id="messages" class="messages"></section>

        <section>
          <div class="composer">
            <textarea id="message" placeholder="escribe tu mensaje..."></textarea>
            <button id="send" type="button">enviar</button>
          </div>
          <div class="hint">enter envía · shift+enter agrega salto.</div>
        </section>
      </main>
    </div>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>easymarket chat test</title>
    <style>
      body { font-family: sans-serif; margin: 2rem; }
      input, button { font-size: 1rem; padding: 0.5rem; }
      #log { margin-top: 1rem; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>easymarket chat test</h1>
    <p>tenant: <input id="tenant" value="demo" /></p>
    <p>message: <input id="message" value="hola" /></p>
    <button id="send">send</button>
    <pre id="log"></pre>
    <script type="module" src="/chat.js"></script>
  </body>
</html>
